# nginx proxy address - http://172.17.0.1:80

name: appwrite
x-logging: &default-logging
  options:
    max-size: '5m'
    max-file: '1'
  driver: json-file

services:
  app:
    image: appwrite/appwrite:latest
    container_name: appwrite-app
    hostname: ${BASE_HOST_NAME:-$HOSTNAME}
    restart: always
    pull_policy: always
    logging: *default-logging
    environment:
      TZ: ${TZ:-America/New_York}
      CONTAINER_NAME: appwrite-app
      HOSTNAME: ${BASE_HOST_NAME:-$HOSTNAME}
      _APP_ENV: production
      _APP_OPENSSL_KEY_V1: ${ENCRYPTION_KEY:-changeme_encryption_key_min_32_chars}
      _APP_EXECUTOR_SECRET: ${SECURE_SECRET:-changeme_executor_secret_min_32_chars}
      _APP_DOMAIN: ${BASE_HOST_NAME:-$HOSTNAME}
      _APP_DOMAIN_TARGET: ${BASE_HOST_NAME:-$HOSTNAME}
      _APP_DB_HOST: appwrite-db
      _APP_DB_PORT: 3306
      _APP_DB_SCHEMA: ${DB_CREATE_DATABASE_NAME:-appwrite}
      _APP_DB_USER: ${DB_USER_NAME:-appwrite}
      _APP_DB_PASS: ${DB_USER_PASS:-changeme_db_password}
      _APP_DB_ROOT_PASS: ${DB_ADMIN_PASS:-changeme_admin_password}
      _APP_REDIS_HOST: appwrite-redis
      _APP_REDIS_PORT: 6379
      _APP_SMTP_HOST: ${EMAIL_SERVER_HOST:-172.17.0.1}
      _APP_SMTP_PORT: ${EMAIL_SERVER_PORT:-587}
      _APP_SMTP_SECURE: tls
      _APP_SMTP_USERNAME: ${EMAIL_SERVER_LOGIN_NAME:-}
      _APP_SMTP_PASSWORD: ${EMAIL_SERVER_LOGIN_PASS:-}
    ports:
      - '172.17.0.1:80:80'
    volumes:
      - './volumes/data/appwrite:/storage'
    depends_on:
      - appwrite-db
      - appwrite-redis
    labels:
      - 'traefik.enable=true'
      - 'cloudflare.enable=true'
      - 'traefik.docker.network=proxy'
      - 'cloudflare.service=http://appwrite-app:80'
      - 'cloudflare.hostname=appwrite.${CLOUDFLARE_ZONE_NAME:-}'
      - 'traefik.http.routers.appwrite-app.entrypoints=http'
      - 'traefik.http.routers.appwrite-app-secure.tls=true'
      - 'traefik.http.routers.appwrite-app.rule=Host($(${BASE_HOST_NAME:-$HOSTNAME}))'
      - 'traefik.http.middlewares.appwrite-app-https-redirect.redirectscheme.scheme=https'
      - 'traefik.http.routers.appwrite-app.middlewares=appwrite-app-https-redirect'
      - 'traefik.http.routers.appwrite-app-secure.entrypoints=https'
      - 'traefik.http.routers.appwrite-app-secure.rule=Host($(${BASE_HOST_NAME:-$HOSTNAME}))'
      - 'traefik.http.routers.appwrite-app-secure.tls.certresolver=cloudflare'
      - 'traefik.http.routers.appwrite-app-secure.service=appwrite-app'
      - 'traefik.http.services.appwrite-app.loadbalancer.server.port=80'
    networks:
      - appwrite
      - proxy
      - cloudflare

  appwrite-db:
    image: mariadb:latest
    container_name: appwrite-db
    hostname: appwrite-db
    restart: always
    pull_policy: always
    logging: *default-logging
    environment:
      TZ: ${TZ:-America/New_York}
      CONTAINER_NAME: appwrite-db
      MYSQL_DATABASE: ${DB_CREATE_DATABASE_NAME:-appwrite}
      MYSQL_USER: ${DB_USER_NAME:-appwrite}
      MYSQL_PASSWORD: ${DB_USER_PASS:-changeme_db_password}
      MYSQL_ROOT_PASSWORD: ${DB_ADMIN_PASS:-changeme_admin_password}
    volumes:
      - './volumes/data/db/mariadb/appwrite:/var/lib/mysql'
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - appwrite

  appwrite-redis:
    image: redis:alpine
    container_name: appwrite-redis
    hostname: appwrite-redis
    restart: always
    pull_policy: always
    logging: *default-logging
    environment:
      TZ: ${TZ:-America/New_York}
      CONTAINER_NAME: appwrite-redis
    volumes:
      - './volumes/data/db/redis/appwrite:/data'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - appwrite

networks:
  appwrite:
    name: appwrite
    external: false
  proxy:
    external: true
  cloudflare:
    external: true
